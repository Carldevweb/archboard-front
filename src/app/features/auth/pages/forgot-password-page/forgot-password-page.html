<section class="auth-page">
    <div class="auth-card">
        <h1>Reset password</h1>

        @if (errorMessage()) {
        <div class="auth-message auth-message--error">
            {{ errorMessage() }}
        </div>
        }

        @if (successMessage()) {
        <div class="auth-message auth-message--success">
            {{ successMessage() }}
        </div>
        }

        <div class="auth-form">
            <label>
                <span>New password</span>
                <input type="password" [ngModel]="password()" (ngModelChange)="updatePassword($event)"
                    autocomplete="new-password" />
            </label>

            <label>
                <span>Confirm password</span>
                <input type="password" [ngModel]="confirmPassword()" (ngModelChange)="updateConfirmPassword($event)"
                    autocomplete="new-password" (keydown.enter)="submit()" />
            </label>

            <button type="button" (click)="submit()" [disabled]="isSubmitting()">
                Reset password
            </button>
        </div>

        <p class="auth-links">
            <a routerLink="/login">Back to sign in</a>
        </p>
    </div>
</section>
